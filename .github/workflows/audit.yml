name: 知识库健康审计

on:
  push:
    branches: [master]
    paths:
      - '**/*.md'
  pull_request:
    branches: [master]
    paths:
      - '**/*.md'
  schedule:
    - cron: '0 9 * * 1'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full audit
        run: python tools/audit.py --all

      - name: Check for broken links
        run: |
          output=$(python tools/audit.py --check-links)
          echo "$output"
          if echo "$output" | grep -q "broken links"; then
            echo "::warning::发现 broken wikilinks，请检查审计输出"
          fi
